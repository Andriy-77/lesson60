{% extends "base.html" %}
{% block title %}Прайсинг{% endblock %}
{% block content %}
<div class="container">
    <h1>Пакети послуг</h1>
    
    <div class="pricing-table">
        <table class="table table-striped">
            <thead>
                <tr>
                    <th>Пакет</th>
                    <th>Вартість</th>
                    <th>Можливості</th>
                </tr>
            </thead>
            <tbody>
                {% for pkg in packages %}
                <tr>
                    <td><strong>{{ pkg.name }}</strong></td>
                    <td>${{ pkg.price }}</td>
                    <td>{{ pkg.features|linebreaks }}</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>

    <div class="calculator">
        <h2>Калькулятор вартості</h2>
        <form id="calc">
            <label>Тип проекту:</label>
            <select id="type" onchange="calculate()">
                <option value="1">Базовий</option>
                <option value="2">Стандарт</option>
                <option value="3">Преміум</option>
            </select>
            <label>Тривалість (дні):</label>
            <input type="number" id="days" value="30" onchange="calculate()">
            <p>Вартість: <strong>$<span id="result">0</span></strong></p>
        </form>
    </div>
</div>

<script>
function calculate() {
    const type = document.getElementById('type').value;
    const days = document.getElementById('days').value;
    const prices = [1000, 2000, 3000];
    const daily = prices[parseInt(type)-1] / 30;
    const total = (daily * days).toFixed(2);
    document.getElementById('result').textContent = total;
}
calculate();
</script>

<style>
.pricing-table { margin: 20px 0; }
.calculator { padding: 20px; border: 1px solid #ddd; border-radius: 5px; margin-top: 20px; }
.calculator input, .calculator select { margin: 10px; padding: 8px; }
</style>
{% endblock %}
