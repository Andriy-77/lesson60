{% extends "base.html" %}
{% block title %}Аналітика{% endblock %}
{% block content %}
<div class="container">
    <h1>Аналітика</h1>
    
    <div class="stats">
        <div class="stat-card">
            <h3>Всього замовлень</h3>
            <p>{{ total }}</p>
        </div>
        <div class="stat-card">
            <h3>Завершено</h3>
            <p>{{ done }}</p>
        </div>
    </div>

    <h2>Активність по місяцях</h2>
    <table class="table">
        <tr><th>Місяць</th><th>Замовлень</th></tr>
        {% for m in months %}
        <tr><td>{{ m.month }}</td><td>{{ m.count }}</td></tr>
        {% empty %}
        <tr><td colspan="2">Немає даних</td></tr>
        {% endfor %}
    </table>
</div>

<style>
.stats { display: flex; gap: 20px; margin: 20px 0; }
.stat-card { padding: 20px; border: 1px solid #ddd; border-radius: 5px; flex: 1; }
.stat-card h3 { margin: 0; font-size: 14px; }
.stat-card p { font-size: 24px; margin: 10px 0 0 0; }
</style>
{% endblock %}
